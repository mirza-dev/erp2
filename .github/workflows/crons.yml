name: Production Crons

# Coolify cutover sonrası Vercel cron yerine kullanılır.
# Secrets gerekli: APP_URL (https://erp.kokpit.app), CRON_SECRET (Coolify env ile aynı).
# Off-peak dakikalar (`7,37`) — top-of-hour drift'ten kaçınmak için.

on:
  schedule:
    # 6 saatte bir: TR 03:07, 09:07, 15:07, 21:07 (± GH Actions drift 5-15 dk)
    - cron: "7,37 0,6,12,18 * * *"
    # Saatte bir: XX:07
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Hangi cron job tetiklensin"
        type: choice
        options: [all, six-hourly, hourly]
        default: all

concurrency:
  group: production-crons
  cancel-in-progress: false

jobs:
  six-hourly:
    if: |
      github.event.schedule == '7,37 0,6,12,18 * * *' ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'six-hourly'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: AI alert suggest
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/alerts/ai-suggest" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Alert scan
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/alerts/scan" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Purchase copilot (AI öneriler)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/ai/purchase-copilot" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Paraşüt sync-all
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/parasut/sync-all" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Orders — expire quotes
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/orders/expire-quotes" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Quotes — expire (standalone)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/quotes/expire" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Check shipments (overdue)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/orders/check-shipments" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Summary
        if: always()
        run: echo "::notice ::6h crons tamamlandı. Bireysel step durumları yukarıda."

  hourly:
    if: |
      github.event.schedule == '7 * * * *' ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'hourly'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Email — retry failed
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/email/retry-failed" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Paraşüt — poll e-documents
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/parasut/poll-e-documents" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Summary
        if: always()
        run: echo "::notice ::1h crons tamamlandı."
