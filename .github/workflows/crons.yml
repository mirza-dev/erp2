name: Production Crons

# Coolify cutover sonrası Vercel cron yerine kullanılır.
# Secrets gerekli: APP_URL (https://erp.kokpit.app), CRON_SECRET (Coolify env ile aynı).
# Off-peak dakika `7` — GH Actions top-of-hour drift'ten kaçınmak için.

on:
  schedule:
    # 6 saatte bir = günde 4 invocation (UTC 00:07/06:07/12:07/18:07 → TR 03:07/09:07/15:07/21:07)
    - cron: "7 0,6,12,18 * * *"
    # Saatte bir = günde 24 invocation (XX:07)
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Hangi cron job tetiklensin"
        type: choice
        options: [all, six-hourly, hourly]
        default: all

concurrency:
  group: production-crons
  cancel-in-progress: false

jobs:
  six-hourly:
    if: |
      github.event.schedule == '7 0,6,12,18 * * *' ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'six-hourly'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: AI alert suggest
        id: ai_suggest
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/alerts/ai-suggest" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Alert scan
        id: alerts_scan
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/alerts/scan" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Purchase copilot (AI öneriler)
        id: purchase_copilot
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/ai/purchase-copilot" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Paraşüt sync-all
        id: parasut_sync_all
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/parasut/sync-all" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Orders — expire quotes
        id: orders_expire_quotes
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/orders/expire-quotes" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Quotes — expire (standalone)
        id: quotes_expire
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/quotes/expire" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Check shipments (overdue)
        id: check_shipments
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/orders/check-shipments" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Summary (fail job if any step failed)
        if: always()
        env:
          OUTCOMES: |
            ai_suggest=${{ steps.ai_suggest.outcome }}
            alerts_scan=${{ steps.alerts_scan.outcome }}
            purchase_copilot=${{ steps.purchase_copilot.outcome }}
            parasut_sync_all=${{ steps.parasut_sync_all.outcome }}
            orders_expire_quotes=${{ steps.orders_expire_quotes.outcome }}
            quotes_expire=${{ steps.quotes_expire.outcome }}
            check_shipments=${{ steps.check_shipments.outcome }}
        run: |
          echo "$OUTCOMES"
          fails=$(echo "$OUTCOMES" | grep -c "=failure" || true)
          total=$(echo "$OUTCOMES" | grep -c "=" || true)
          if [ "$fails" -gt 0 ]; then
            echo "::error ::$fails/$total six-hourly cron step(s) failed — workflow marked failure"
            exit 1
          fi
          echo "::notice ::All $total six-hourly cron steps succeeded"

  hourly:
    if: |
      github.event.schedule == '7 * * * *' ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'hourly'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Email — retry failed
        id: email_retry
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/email/retry-failed" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Paraşüt — poll e-documents
        id: parasut_poll
        continue-on-error: true
        timeout-minutes: 5
        run: |
          curl --retry 3 --retry-delay 20 --max-time 60 -fsSL \
            -X POST "$APP_URL/api/parasut/poll-e-documents" \
            -H "Authorization: Bearer $CRON_SECRET"

      - name: Summary (fail job if any step failed)
        if: always()
        env:
          OUTCOMES: |
            email_retry=${{ steps.email_retry.outcome }}
            parasut_poll=${{ steps.parasut_poll.outcome }}
        run: |
          echo "$OUTCOMES"
          fails=$(echo "$OUTCOMES" | grep -c "=failure" || true)
          total=$(echo "$OUTCOMES" | grep -c "=" || true)
          if [ "$fails" -gt 0 ]; then
            echo "::error ::$fails/$total hourly cron step(s) failed — workflow marked failure"
            exit 1
          fi
          echo "::notice ::All $total hourly cron steps succeeded"
