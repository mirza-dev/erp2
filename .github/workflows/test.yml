name: Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
        env:
          ANTHROPIC_API_KEY: test-key-ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
  # Güvenlik gate'i: allowlist dışı high/critical npm açığı → kırmızı
  # (allowlist + gerekçeler: scripts/check-deps.mjs)
  deps-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit → allowlist karşılaştırması
        run: npm audit --omit=dev --json | node scripts/check-deps.mjs
        # npm audit nonzero dönebilir; karar check-deps.mjs'in — pipefail kapalı
        shell: bash {0}
