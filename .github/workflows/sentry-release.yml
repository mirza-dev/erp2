name: Sentry Release

# Source map upload — Docker build dışında, secret-safe.
# Dockerfile SENTRY_AUTH_TOKEN bilmez; bu workflow GH Actions runner'da build edip
# `@sentry/nextjs` `withSentryConfig` auto-upload sayesinde source map'i Sentry'e yollar.
#
# Secrets gerekli:
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   NEXT_PUBLIC_SENTRY_DSN, APP_URL,
#   SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  release:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build with Sentry source map upload
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.APP_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: npm run build
